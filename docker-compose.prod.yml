services:
  neo4j:
    image: neo4j:5.20-community
    container_name: rag-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    # Neo4j 5.x: NEO4J_ 접두사 env var 는 모두 config key 로 해석되므로
    # NEO4J_AUTH / NEO4J_PLUGINS 같은 공식 변수만 전달.
    # 인증정보는 compose 변수치환으로 healthcheck 안에 직접 박는다.
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password1234}"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password1234} 'RETURN 1' >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rag-backend
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-password1234}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://127.0.0.1}"
      CHROMA_PERSIST_DIR: "/app/chroma_db"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: front/Dockerfile
    container_name: rag-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  neo4j_data:
  neo4j_logs:
